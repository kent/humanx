version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Toronto
    open-pull-requests-limit: 10
    groups:
      next-react:
        patterns:
          - next
          - react
          - react-dom
          - eslint-config-next
      world:
        patterns:
          - "@worldcoin/*"
      tooling:
        dependency-type: development
    ignore:
      - dependency-name: eslint
        update-types:
          - version-update:semver-major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Toronto
    open-pull-requests-limit: 5
