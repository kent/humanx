name: Feature request
description: Propose a scoped improvement.
title: "Feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundaries
      options:
        - label: This does not claim HumanX verifies X account ownership unless OAuth account verification is included.
          required: true
        - label: This does not require exposing full World ID nullifiers publicly.
          required: true
